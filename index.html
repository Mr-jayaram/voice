<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxFlow - Premium Voice to Text</title>
    <meta name="description" content="A premium voice-to-text application supporting English and Tamil with real-time transcription and elegant UI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <h1 id="main-title">VoxFlowsss</h1>
            <p class="subtitle">Convert your thoughts to text instantly</p>
        </header>

        <section class="glass-card">
            <div class="controls-top">
                <div class="language-selector">
                    <label for="language-select">Select Language</label>
                    <select id="language-select">
                        <option value="en-US">English (US)</option>
                        <option value="ta-IN">Tamil (தமிழ்)</option>
                    </select>
                </div>
                <div class="status-indicator" id="status">
                    <span class="status-dot"></span>
                    <span class="status-text">Ready to record</span>
                </div>
            </div>

            <div class="text-display-area">
                <textarea id="transcription-output" placeholder="Your transcription will appear here..."></textarea>
                <div class="visualizer" id="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="mic-btn" class="btn-mic" aria-label="Start Recording">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <span id="mic-btn-text">Start Listening</span>
                </button>

                <div class="secondary-actions">
                    <button id="copy-btn" class="btn-secondary" title="Copy to clipboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy
                    </button>
                    <button id="clear-btn" class="btn-secondary" title="Clear text">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear
                    </button>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 VoxFlow. Powered by Web Speech API.</p>
        </footer>
    </main>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
